
<!-- Modal to assign tag-->
<div class="modal fade" id="assignTagModal" tabindex="-1" aria-labelledby="assignTagModal" aria-hidden="true">
<div class="modal-dialog">
    <div class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title">Assign Tag</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <div class="modal-body">
        <div class="d-flex flex-row align-items-center">
            <input id="assignTagKey" class="form-control form-control-sm w-50" type="text" value="Disabled Key" disabled readonly>
            <p style="margin: 0 10px;">:</p>
            <input class="form-control form-control-sm w-50" id="assignTagInput" placeholder="Enter tag here">
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-info" data-bs-dismiss="modal" onclick="assignTag()">Okay</button>
    </div>
    </div>
</div>
</div>

<!-- This is Toast -->
<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="myGreenToast" class="toast align-items-center text-bg-success border-0 p-3" role="alert">
        <div class="toast-body">
            <h5>Successful Attempt</h5>
        </div>
    </div>
    <div id="myRedToast" class="toast align-items-center text-bg-danger border-0 p-3" role="alert">
        <div class="toast-body">
            <h5>Unsuccessfull Attempt</h5>
        </div>
    </div>
</div>
